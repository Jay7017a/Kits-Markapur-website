<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer{
            width:500px;
            height:500px;
            position:relative;
        }
      
        .inner img{
             width:200px;
            height:500px;
            position: absolute;
            top:0px;
            left:0px;
            z-index: 1;
        }
        .inner1 img{
            width:200px;
            height:500px;
            position: absolute;
            top:0px;
            left:50px;
            z-index: 2;
        }
         .inner2 img{
            width:200px;
            height:500px;
            position: absolute;
            top:0px;
            left:100px;
            z-index: 3;
        }
         .inner3 img{
            width:200px;
            height:500px;
            position: absolute;
            top:0px;
            left:150px;
            z-index: 4;
        }
         div img{
            width:100%;
            height:100%;
        }
        img:hover{
            z-index:50;
            transform: rotateX(30deg);
        }
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner">
            <img src="./campus.jpeg">
        </div>
        <div class="inner1">
            <img src="./annaul.jpg">
        </div>
        <div class="inner2">
            <img src="./campus.jpeg">
        </div>
        <div class="inner3">
            <img src="./annaul.jpg">
        </div>
    </div>
</body>
</html>
